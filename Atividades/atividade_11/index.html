<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de IMC</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="css/style.css" rel="stylesheet" type="text/css" media="all">
</head>
<body>

  <div class="card card-imc p-4">
    <h2 class="text-center mb-4 text-primary">Calculadora de IMC</h2>

    <div class="mb-3">
      <label class="form-label">Peso (kg)</label>
      <input type="number" id="peso" class="form-control" placeholder="Ex: 50">
    </div>

    <div class="mb-3">
      <label class="form-label">Altura (m)</label>
      <input type="number" step="0.01" id="altura" class="form-control" placeholder="Ex: 1.60">
    </div>

    <button class="btn btn-imc w-100">Calcular IMC</button>

    <div id="resultado" class="resultado text-center mt-4"></div>
  </div>

  <script src="js/script.js"></script>

</body>
</html>
