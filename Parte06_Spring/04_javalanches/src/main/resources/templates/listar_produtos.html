<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: main-layout(~{::title}, ~{::main})}">

<head>
    <title>Javalanches - Cardápio</title>
</head>

<body>
    <main>
        <h1>Cardápio</h1>
        <hr>
        <div class="row">
            <div class="col-12">
                <div th:if="${categorias.empty}">
                    <div class="alert alert-warning">Nenhuma categoria encontrada.</div>
                </div>

                <div th:each="categoria: ${categorias}">
                    <div class="card mb-4">
                        <div class="card-header bg-secondary text-white">
                            <strong>
                                <span th:text="${categoria.codigoCategoria}"></span>
                                .
                                <a class="text-white text-decoration-none"
                                    th:href="@{/atualizarCategoria(codigoCategoria=${categoria.codigoCategoria})}"
                                    th:text="${categoria.nomeCategoria.toUpperCase()}"></a>
                            </strong>
                            <a th:href="@{/deletarCategoria(codigoCategoria=${categoria.codigoCategoria})}"
                                class="text-white text-decoration-none"
                                title="Excluir categoria e todos os seus produtos"
                                onclick="return confirm('Tem certeza que deseja excluir esta categoria e todos os seus produtos?');">X</a>
                        </div>
                        <div class="card-body">
                            <div th:if="${#lists.isEmpty(categoria.Produtos)}">
                                <p>Nenhum produto cadastrado nessa categoria.</p>
                            </div>
                            <div th:unless="${#lists.isEmpty(categoria.Produtos)}">
                                <div class="list-group">
                                    <div th:each="produto: ${categoria.produtos}" class="list-group-item mb-3">
                                        <div class="d-flex justify-content-between align-items-start">
                                            <div>
                                                <p class="mb-1 fw-semibold">
                                                    <span th:text="${produto.codigoProduto}"></span>
                                                    <span> - </span>
                                                    <a th:href="@{/atualizarProduto(codigoProduto=${produto.codigoProduto})}"
                                                        th:text="${produto.nomeProduto}"></a>
                                                    <span>: R$ </span>
                                                    <span th:text="${produto.precoProduto}"></span>
                                                </p>
                                            </div>
                                            <a th:href="@{/deletarProduto(codigoProduto=${produto.codigoProduto})}"
                                                class="text-danger text-decoration-none fw-bold" title="Excluir produto"
                                                onclick="return confirm('Tem certeza que deseja excluir este produto?');">X</a>
                                        </div>
                                        <p class="mb-0 text-muted"
                                            th:text="${produto.descricaoProduto != null and !#strings.isEmpty(produto.descricaoProduto) ? produto.descricaoProduto : 'Produto sem descrição.'}">
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
